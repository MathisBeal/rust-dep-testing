name: "Security Scan"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  grype-scan:
    runs-on: ubuntu-latest # Même si tu es sur Windows, la CI tourne souvent sur Linux (c'est moins cher/plus rapide)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install CycloneDX
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/CycloneDX/cyclonedx-rust-cargo/releases/download/cargo-cyclonedx-0.5.9/cargo-cyclonedx-installer.sh | sh

      - name: Generate SBOM
        run: cargo cyclonedx -f json --target-in-filename --target x86_64-pc-windows-msvc

      - name: Debug LS
        run: ls -R

      - name: Scan SBOM with Grype
        uses: anchore/scan-action@v3
        id: scan
        with:
          sbom: "./rust-dep-testing_x86_64-pc-windows-msvc.cdx.json" # Adapte le nom si besoin
          format: "sarif"
          output-file: "results.sarif"
          fail-build: false # Pour ne pas bloquer la CI tout de suite

      - name: Debug LS 2
        run: ls -R

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "results.sarif"
