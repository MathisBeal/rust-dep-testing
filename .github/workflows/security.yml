name: "Security Scan"

on:
  schedule:
    # - cron: "0 7 * * *" # Tout les jours à 07:00
    - cron: "*/10 * * * *" # Toutes les 10 minutes (test)
    - cron: "40 7 * * *" # Toutes les 10 minutes (test)

permissions:
  contents: read
  security-events: write

jobs:
  grype-scan:
    runs-on: ubuntu-latest # Même si tu es sur Windows, la CI tourne souvent sur Linux (c'est moins cher/plus rapide)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: "main"

      - name: Install Grype
        run: curl -sSfL https://get.anchore.io/grype | sudo sh -s -- -b /usr/local/bin

      - name: Run Grype
        run: grype . -o sarif > results.sarif

      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "results.sarif"
