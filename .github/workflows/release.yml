name: Create Release and SBOM

on:
  push:
    branches:
      - main # Le workflow se déclenche quand on pousse vers main

env:
  APP_NAME: "rust-dep-testing" # Nom de l'application

jobs:
  # Récupérer le numéro de version à partir du message de commit "... release/1.0.0"
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
    steps:
      - name: Extract version from commit message
        id: extract_version
        run: |
          # Extraire la partie après 'release/' dans le message de commit
          VERSION=$(echo "${{ github.event.head_commit.message }}" | grep -oP 'release/\K[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Debug version
        run: |
          echo "Extracted version: ${{ steps.extract_version.outputs.version }}"

      - name: Verify version
        run: |
          if [ -z "${{ steps.extract_version.outputs.version }}" ]; then
            echo "Erreur : Version introuvable dans le message de commit."
            exit 1
          fi

  # 2. Jobs de build qui attendent la version
  build-and-release:
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            binary_path: "target/release/${APP_NAME}"
            asset_name: "${APP_NAME}-ubuntu-${{ needs.prepare.outputs.version }}"
          - os: windows-latest
            binary_path: "target\\release\\${APP_NAME}.exe"
            asset_name: "${APP_NAME}-windows-${{ needs.prepare.outputs.version }}.exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build application
        run: cargo build --release

      - name: Rename binary for release
        run: mv ${{ matrix.binary_path }} ${{ matrix.asset_name }}

      - name: Upload Binary to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "${{ env.APP_NAME }}-${{ needs.prepare.outputs.version }}"
          name: "${{ env.APP_NAME }} version ${{ needs.prepare.outputs.version }}"
          body: "Release de ${{ env.APP_NAME }} version ${{ needs.prepare.outputs.version }}"
          # On pointe vers le chemin du build et on peut le renommer à la volée
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
